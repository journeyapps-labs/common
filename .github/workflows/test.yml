name: Test

on:
  pull_request:

jobs:
  libs_and_modules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Prettier check
        run: pnpm exec prettier --check --ignore-path .prettierignore --config .prettierrc '**/*.{ts,tsx,js,jsx}'

      - name: Build libs and modules
        run: pnpm build

      - name: Test
        run: pnpm test
